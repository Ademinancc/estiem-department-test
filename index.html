            "hr_committee": { cat: "Committee", title: "Human Resources (HRC)", desc: "You focus on recruitment, onboarding, and ensuring everyone feels valued behind the scenes." },
            "hr_service": { cat: "Committee", title: "Human Resources (HRC)", desc: "You are the ultimate people-person. Your empathy makes you perfect for managing human resources." },
            "community_committee": { cat: "Committee", title: "Members Committee (MC)", desc: "You monitor the pulse of the network, helping new Local Groups integrate and keeping them healthy." },
            "community_service": { cat: "Task Group", title: "LG Exchange", desc: "You love direct connections. You coordinate bilateral visits, fostering deep cultural integration." },

            "visuals_committee": { cat: "Committee", title: "Public Relations (PRC)", desc: "You are the creative eye! Your talent lies in capturing attention through branding and design." },
            "visuals_service": { cat: "Task Group", title: "Visual Storytelling", desc: "You capture the emotion of an event through photography, videography, and stunning narratives." },
            "audio_committee": { cat: "Project", title: "ESTIEM Magazine", desc: "You are the author of our history. You appreciate the art of writing, editing, and curating articles." },
            "audio_service": { cat: "Project", title: "ESTIEM Podcast", desc: "You are a natural conversationalist. You love diving deep into discussions and sharing audio journeys." },
            "corporate_committee": { cat: "Committee", title: "Corporate Relations (CRC)", desc: "You are a networking powerhouse! You pitch visions to secure long-term corporate partnerships." },
            "corporate_service": { cat: "Service", title: "ESTIEM Hunt", desc: "You are the ultimate connector! You bridge the gap between talented students and companies." },
            "diplomacy_committee": { cat: "Position", title: "ESTIEM Ambassadors", desc: "You are our Diplomat! You thrive in cross-cultural environments, building bridges with external partners." },
            "diplomacy_service": { cat: "Task Group", title: "Language Programme", desc: "You break down cultural barriers by promoting language learning and direct communication." },

            "competition_committee": { cat: "Service", title: "BusinessBooster", desc: "You have an entrepreneurial spirit! You stimulate innovation and startup culture among students." },
            "competition_service": { cat: "Service", title: "T.I.M.E.S.", desc: "You have an elite business mindset! You excel at solving complex corporate cases and competitions." },
            "academic_committee": { cat: "Committee", title: "Education Development (EDC)", desc: "You take vague academic goals and structure them into brilliant educational frameworks." },
            "academic_service": { cat: "Initiative", title: "Lean Six Sigma / Circular Economy", desc: "You are deeply invested in academic excellence and specialized engineering/sustainability courses." },
            "travel_committee": { cat: "Service", title: "Activity Week", desc: "You are the ultimate host! You create fun, engaging itineraries to experience the local lifestyle." },
            "travel_service": { cat: "Service", title: "Europe3D", desc: "You are a deep-dive explorer! You curate intense experiences exploring politics, economy, and culture." },
            "impact_committee": { cat: "Committee", title: "SER Committee", desc: "You are the visionary for change! You are deeply passionate about Social and Environmental Responsibility." },
            "impact_service": { cat: "Service", title: "PEAK", desc: "You believe growth happens outside the comfort zone! You combine mental resilience with physical challenges." }
        };

        activePhase1 = phase1Pool.sort(() => 0.5 - Math.random()).slice(0, 5);
        activePhase2 = phase2Pool[Math.floor(Math.random() * phase2Pool.length)];

        let dominantTrait = "";
        let deepDiveIndex = 0;
        let phase3Points = {};

        function renderQuestion() {
            const qArea = document.getElementById("q-area");
            const helperText = document.getElementById("helper-text");
            const nextBtn = document.getElementById("next-btn");
            
            qArea.classList.remove("active"); qArea.classList.add("hidden");
            selectedOptions = []; nextBtn.classList.remove("active"); 

            setTimeout(() => {
                let currentData;

                if (currentStep < 5) {
                    currentData = activePhase1[currentStep]; currentData.phase = "Phase 1: Instincts";
                    maxSelections = 2; helperText.innerText = "Select up to 2 options."; helperText.style.display = "block";
                    document.getElementById("next-btn").style.display = "block";
                } else if (currentStep === 5) {
                    currentData = activePhase2; currentData.phase = "Phase 2: Crossroads";
                    maxSelections = 1; helperText.innerText = "Select 1 option."; helperText.style.display = "block";
                    document.getElementById("next-btn").style.display = "none"; 
                    updateMascot("A crucial fork in the road... Where will you walk?");
                } else {
                    if(currentStep === 6) {
                        dominantTrait = Object.keys(points).reduce((a, b) => points[a] >= points[b] ? a : b);
                        activePhase3 = deepDivePools[dominantTrait].sort(() => 0.5 - Math.random()).slice(0, 3);
                        updateMascot("I see your true colors shining through...");
                    }
                    currentData = activePhase3[deepDiveIndex]; currentData.phase = "Phase 3: The Deep Dive";
                    maxSelections = 1; helperText.innerText = ""; helperText.style.display = "none";
                    document.getElementById("next-btn").style.display = "none"; 
                }

                document.getElementById("counter").innerText = `Step ${currentStep + 1} / ${totalSteps}`;
                document.getElementById("phase-label").innerText = currentData.phase;
                document.getElementById("question-text").innerText = currentData.text;
                document.getElementById("progress").style.width = ((currentStep) / totalSteps) * 100 + "%";

                const optionsBox = document.getElementById("options-box"); optionsBox.innerHTML = "";
                
                currentData.options.forEach(opt => {
                    let btn = document.createElement("button"); btn.className = "option-btn"; btn.innerText = opt.text;
                    btn.onclick = () => toggleSelection(opt, btn, currentData.multi); optionsBox.appendChild(btn);
                });

                qArea.classList.remove("hidden"); qArea.classList.add("active");
            }, 400);
        }

        function toggleSelection(option, btn, isMulti) {
            if (!isMulti) { selectedOptions = [option]; submitStep(); return; }
            const index = selectedOptions.findIndex(o => o.text === option.text);
            if (index > -1) { selectedOptions.splice(index, 1); btn.classList.remove("selected"); } 
            else {
                if (selectedOptions.length < maxSelections) { selectedOptions.push(option); btn.classList.add("selected"); } 
                else { btn.style.transform = "translateX(5px)"; setTimeout(() => btn.style.transform = "translateX(-5px)", 50); setTimeout(() => btn.style.transform = "translateX(0)", 100); }
            }
            const nextBtn = document.getElementById("next-btn");
            if (selectedOptions.length > 0) nextBtn.classList.add("active"); else nextBtn.classList.remove("active");
        }

        function submitStep() {
            if (currentStep < 5) {
                let chosenTraits = [];
                selectedOptions.forEach(opt => { points[opt.trait]++; chosenTraits.push(opt.trait); });
                feedbackLog.phase1.push(chosenTraits.join("+"));
            } else if (currentStep === 5) {
                preferredEnvironment = selectedOptions[0].env; 
                feedbackLog.phase2 = preferredEnvironment;
            } else {
                let resKey = selectedOptions[0].res;
                phase3Points[resKey] = (phase3Points[resKey] || 0) + 1;
                feedbackLog.phase3.push(resKey);
                deepDiveIndex++;
            }

            currentStep++;
            if (currentStep >= totalSteps) {
                let finalKey = Object.keys(phase3Points).reduce((a, b) => phase3Points[a] >= phase3Points[b] ? a : b);
                showResult(finalKey);
            } else { renderQuestion(); }
        }

        function showResult(finalKey) {
            const qArea = document.getElementById("q-area"); const resScreen = document.getElementById("result-screen");
            let exactMatchKey = finalKey + "_" + preferredEnvironment; let finalResult = resultsData[exactMatchKey];
            
            // Store final result for feedback
            feedbackLog.finalResult = finalResult.title;

            document.getElementById("progress").style.width = "100%";
            qArea.classList.remove("active"); qArea.classList.add("hidden");
            
            updateMascot("The stars have aligned. Your destiny is clear.");

            setTimeout(() => {
                document.getElementById("header-info").style.display = "none"; document.getElementById("prog-container").style.display = "none"; qArea.style.display = "none";
                document.getElementById("res-category").innerText = finalResult.cat; document.getElementById("res-title").innerText = finalResult.title; document.getElementById("res-desc").innerText = finalResult.desc;
                resScreen.style.display = "block"; setTimeout(() => { resScreen.classList.remove("hidden"); resScreen.classList.add("active"); }, 50);
            }, 400);
        }

        function copyFeedbackData() {
            const logString = `[ESTIEM Feedback] P1:[${feedbackLog.phase1.join(" | ")}] P2:[${feedbackLog.phase2}] P3:[${feedbackLog.phase3.join(", ")}] -> ${feedbackLog.finalResult}`;
            navigator.clipboard.writeText(logString).then(() => {
                const btn = document.getElementById("copy-feedback");
                btn.innerText = "✅ Copied to Clipboard!";
                setTimeout(() => { btn.innerText = "📋 Copy Feedback Data (For Devs)"; }, 3000);
            });
        }

        renderQuestion();
    </script>
