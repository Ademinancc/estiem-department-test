<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESTIEM Personality Matrix V16 - Final Release</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --estiem-green: #205e44;
            --estiem-green-light: #2a7a58;
            --estiem-green-glow: rgba(32, 94, 68, 0.15);
            --bg-light: #f4f7f6; 
            --card-white: #ffffff;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --error-red: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; padding: 20px; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            color: var(--text-dark); background-color: var(--bg-light);
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 24px 24px; overflow-x: hidden;
        }

        .app-container {
            display: flex; flex-direction: row; align-items: center; justify-content: center;
            gap: 50px; max-width: 1100px; width: 100%;
        }

        /* LEFT: MASCOT SIDE */
        .mascot-side { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; width: 100%; }
        
        .mascot-bubble {
            background: var(--card-white); color: var(--text-dark); padding: 20px 28px; 
            border-radius: 20px; border-bottom-left-radius: 0; 
            font-size: 16px; font-weight: 700; box-shadow: 0 10px 25px rgba(0,0,0,0.08); 
            margin-bottom: 25px; text-align: center; border: 2px solid var(--estiem-green-glow);
            max-width: 320px; line-height: 1.6; letter-spacing: 0.3px;
            transition: all 0.3s ease; min-height: 90px; display: flex; align-items: center; justify-content: center;
            white-space: pre-wrap; /* TYPEWRITER SPACE FIX */
        }

        .mascot-art-large {
            width: 100%; height: 500px;
            background-image: url('percy_base.png'); 
            background-size: contain; background-repeat: no-repeat; background-position: center;
        }

        /* RIGHT: QUIZ CARD */
        .quiz-side { flex: 1.5; display: flex; justify-content: center; width: 100%; }
        
        .quiz-card {
            background: var(--card-white); border-radius: 24px; width: 100%; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.08), 0 0 0 1px rgba(32, 94, 68, 0.05);
            padding: 45px 50px; position: relative; border-top: 8px solid var(--estiem-green); overflow: hidden; 
        }

        .header-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-btn { background: none; border: none; color: var(--text-muted); font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; padding: 5px 0; visibility: hidden; transition: color 0.2s; }
        .back-btn:hover { color: var(--estiem-green); }
        .header-badges { display: flex; gap: 12px; align-items: center; }
        .question-counter { font-size: 13px; font-weight: 800; color: var(--estiem-green); text-transform: uppercase; letter-spacing: 2px; background: var(--estiem-green-glow); padding: 8px 16px; border-radius: 30px; }
        
        .progress-container { width: 100%; background-color: #e2e8f0; border-radius: 20px; height: 8px; margin-bottom: 35px; overflow: hidden; }
        .progress-bar { height: 100%; background-color: var(--estiem-green); width: 0%; border-radius: 20px; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }

        .helper-text { font-size: 14px; color: var(--estiem-green-light); font-weight: 700; margin-bottom: 30px; height: 16px; transition: color 0.3s; letter-spacing: 0.5px; }

        h2 { font-size: 22px; font-weight: 800; color: var(--text-dark); margin-top: 0; margin-bottom: 30px; line-height: 1.6; }

        #q-area { transition: opacity 0.3s ease, transform 0.3s ease; }
        .fade-out { opacity: 0; transform: translateX(-15px); pointer-events: none; }
        .fade-in { opacity: 1; transform: translateX(0); }

        .option-btn {
            display: block; width: 100%; padding: 20px 24px; margin-bottom: 16px;
            background-color: var(--card-white); border: 2px solid #e2e8f0;
            border-radius: 16px; cursor: pointer; font-size: 16px; font-weight: 600;
            color: var(--text-dark); text-align: left; transition: all 0.2s ease;
            line-height: 1.5;
        }
        .option-btn:hover { border-color: var(--estiem-green-light); transform: translateY(-3px); box-shadow: 0 6px 15px var(--estiem-green-glow); }
        .option-btn.selected { background-color: var(--estiem-green); border-color: var(--estiem-green); color: #fff; transform: translateY(-3px); box-shadow: 0 10px 25px var(--estiem-green-glow); }
        
        .action-container { margin-top: 35px; display: flex; justify-content: flex-end; }
        .next-btn { background-color: #e2e8f0; color: var(--text-muted); padding: 16px 40px; border-radius: 14px; font-weight: 800; font-size: 17px; border: none; cursor: pointer; transition: all 0.3s ease; pointer-events: none; }
        .next-btn.active { pointer-events: auto; background-color: var(--estiem-green); color: #fff; box-shadow: 0 10px 25px var(--estiem-green-glow); }

        #result-screen { display: none; text-align: center; opacity: 0; transition: opacity 0.5s ease; }
        #result-screen.fade-in { opacity: 1; }
        .entity-title { font-size: 40px; font-weight: 800; color: var(--estiem-green); margin: 0 0 25px 0; }
        .entity-desc { font-size: 17px; line-height: 1.8; color: var(--text-dark); margin-bottom: 40px; padding: 0 15px; }

        /* ACCURACY SECTION */
        .feedback-section { border-top: 2px dashed #e2e8f0; padding-top: 30px; margin-top: 30px; }
        .feedback-label { font-size: 14px; font-weight: 800; color: var(--text-muted); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .feedback-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .acc-btn { padding: 14px; font-size: 13px; font-weight: 700; border: 2px solid #e2e8f0; border-radius: 12px; background: white; cursor: pointer; transition: 0.2s; }
        .acc-btn:hover { background: var(--estiem-green-glow); border-color: var(--estiem-green); }
        .acc-btn.voted { background: var(--estiem-green); color: white; border-color: var(--estiem-green); pointer-events: none; }

        @media (max-width: 900px) {
            .app-container { flex-direction: column; gap: 30px; }
            .mascot-art-large { height: 300px; }
            .quiz-card { padding: 35px 25px; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="mascot-side">
            <div class="mascot-bubble" id="mascot-msg">Loading...</div>
            <div class="mascot-art-large"></div>
        </div>

        <div class="quiz-side">
            <div class="quiz-card">
                <div class="header-info">
                    <button class="back-btn" id="back-btn" onclick="goBack()"><i class="fa-solid fa-arrow-left"></i> Back</button>
                    <div class="header-badges">
                        <span class="question-counter" id="counter">Step 1 / 9</span>
                    </div>
                </div>
                
                <div class="progress-container"><div class="progress-bar" id="progress"></div></div>

                <div id="q-area" class="fade-in">
                    <h2 id="question-text">...</h2>
                    <div class="helper-text" id="helper-text">Select up to 2 options.</div>
                    <div id="options-box"></div>
                    <div class="action-container">
                        <button class="next-btn" id="next-btn" onclick="submitStep()">Next</button>
                    </div>
                </div>

                <div id="result-screen">
                    <div id="res-category" style="font-size: 14px; font-weight: 800; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase;">Category</div>
                    <div class="entity-title" id="res-title">The Strategist</div>
                    <p class="entity-desc" id="res-desc">Analyzing...</p>
                    
                    <div class="feedback-section">
                        <div class="feedback-label">Is this result accurate?</div>
                        <div class="feedback-grid">
                            <button class="acc-btn" onclick="submitFeedback('Spot On')">🔥 Spot On</button>
                            <button class="acc-btn" onclick="submitFeedback('Close')">👌 Close Enough</button>
                            <button class="acc-btn" onclick="submitFeedback('Not Really')">🤨 Not Really</button>
                            <button class="acc-btn" onclick="submitFeedback('Wrong')">❌ Totally Wrong</button>
                        </div>
                    </div>
                    
                    <button class="option-btn" style="margin-top: 30px; text-align: center; justify-content: center; display: flex;" onclick="location.reload()">Restart Journey</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- SUPABASE CONFIG ---
        const SUPABASE_URL = "https://qtryokbquvwyhhobvcsd.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF0cnlva2JxdXZ3eWhob2J2Y3NkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0OTA4OTAsImV4cCI6MjA5NDA2Njg5MH0.svJch4bRsN3pJTu-qquOdyH-vR8ejQy-p8M7-f5Qkhc";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- MASTER DATA POOL ---
        const phase1Pool = [
            { text: "Your local group is hosting a massive international event and a major sponsor pulls out at the last minute. Your reflex?", multi: true, options: [ { text: "Restructure the budget immediately to find financial loopholes.", trait: "A" }, { text: "Gather the core team to ensure panic doesn't destroy morale.", trait: "N" }, { text: "Draft a charismatic emergency pitch to secure a new partner.", trait: "C" }, { text: "Adapt the logistics on the ground to make the event work regardless.", trait: "P" } ] },
            { text: "You are dropped into a foreign city where you don't speak the language.", multi: true, options: [ { text: "Study the public transport map and optimize my routes.", trait: "A" }, { text: "Find friendly locals and try to connect through gestures.", trait: "N" }, { text: "Confidently bluff my way into conversations and exclusive spots.", trait: "C" }, { text: "Start walking without a map to discover hidden areas.", trait: "P" } ] },
            { text: "A complex, chaotic project is handed to you. How do you tame it?", multi: true, options: [ { text: "Break it down into a strict, logical timeline and delegate tasks.", trait: "A" }, { text: "Ensure everyone in the working group feels heard and valued.", trait: "N" }, { text: "Paint a grand vision of the final result to inspire the team.", trait: "C" }, { text: "Dive straight into the field and tackle the most physical tasks first.", trait: "P" } ] },
            { text: "At a formal corporate gala dinner, where can we find you?", multi: true, options: [ { text: "Analyzing industry trends with executives in the corner.", trait: "A" }, { text: "Having a deep, meaningful conversation with a quiet guest.", trait: "N" }, { text: "Holding the center of attention, pitching a brilliant idea.", trait: "C" }, { text: "Scouting the venue, restless, waiting for the real adventure.", trait: "P" } ] },
            { text: "When resolving a conflict between two stubborn people, you:", multi: true, options: [ { text: "Point out the logical flaws in both of their arguments.", trait: "A" }, { text: "Create a safe space for them to express their hidden feelings.", trait: "N" }, { text: "Use your negotiation skills to forge a strategic compromise.", trait: "C" }, { text: "Force them to complete a difficult physical task together.", trait: "P" } ] },
            { text: "Your ultimate definition of 'success' in a project is:", multi: true, options: [ { text: "Maximum efficiency and measurable, data-backed ROI.", trait: "A" }, { text: "The team growing closer and learning about themselves.", trait: "N" }, { text: "A massive network expansion and external recognition.", trait: "C" }, { text: "Pushing boundaries, traveling, and executing the impossible.", trait: "P" } ] }
        ];

        const phase2Pool = [
            { text: "Every great organization has two distinct realms. Where do you thrive?", multi: false, options: [ { text: "The Control Room: Designing systems, rules, and administrative health.", env: "committee" }, { text: "The Stage: Delivering speeches, trainings, and engaging crowds.", env: "service" }, { text: "The Field: Organizing dynamic, traveling events and competitions.", env: "service" } ] }
        ];

        const deepDivePools = {
            "A": [{ text: "You are auditing a massive European project. Focus on:", options: [{ text: "Cost-efficiency and ROI metrics.", res: "finance" }, { text: "IT structure of shared data.", res: "tech" }, { text: "Strict legal consistency.", res: "rules" }, { text: "Knowledge transfer across generations.", res: "process" }] }],
            "N": [{ text: "A newbie feels lost in the network. You ask them:", options: [{ text: "'What deep internal passion drives you?'", res: "emotions" }, { text: "'What presentation skills do you want to learn?'", res: "teaching" }, { text: "'How can we structure your onboarding journey?'", res: "hr" }, { text: "'Which Local Group feels like home to you?'", res: "community" }] }],
            "C": [{ text: "You have 5 minutes with a CEO. What is your goal?", options: [{ text: "Pitch a stunning visual branding campaign.", res: "visuals" }, { text: "Record a quick, profound interview for an audience.", res: "audio" }, { text: "Negotiate a long-term strategic partnership.", res: "corporate" }, { text: "Discuss cross-cultural European integration.", res: "diplomacy" }] }],
            "P": [{ text: "What makes a journey truly unforgettable?", options: [{ text: "The intense pressure of solving a business case.", res: "competition" }, { text: "Learning advanced engineering methodologies.", res: "academic" }, { text: "Immersing in a foreign culture's politics.", res: "travel" }, { text: "Pushing physical limits in nature.", res: "impact" }] }]
        };

        const resultsData = {
            "finance_committee": { cat: "Committee", title: "Financial Controllers (FC)", desc: "You ensure financial transparency and courageously ask the tough questions to protect the network." },
            "tech_committee": { cat: "Committee", title: "Information Technology (ITC)", desc: "You are the architect of the digital space! sen systems and maintenance are your home." },
            "rules_committee": { cat: "Committee", title: "Financial & Legal (FLC)", desc: "You have a brilliant mind for governance and legalities." },
            "process_committee": { cat: "Committee", title: "Knowledge Management (KMC)", desc: "You ensure valuable organizational knowledge is passed down flawlessly." },
            "emotions_service": { cat: "Initiative", title: "Human Skills Advocate", desc: "You facilitate intimate spaces where ESTIEMers can explore topics deeply and authentically." },
            "teaching_service": { cat: "Service", title: "Summer Academy", desc: "You belong in an environment of open discussion and profound personal development." },
            "corporate_service": { cat: "Service", title: "ESTIEM Hunt", desc: "You bridge the gap between talented students and the corporate world." },
            "travel_service": { cat: "Service", title: "Europe3D", desc: "You curate intense experiences exploring politics, economy, and culture." },
            "competition_service": { cat: "Service", title: "T.I.M.E.S.", desc: "You excel at solving complex corporate cases and competitions." }
            // Logic maps remaining 32 entities dynamically...
        };

        // --- CORE ENGINE ---
        let currentStep = 0;
        let activeQuestions = new Array(9).fill(null);
        let userAnswers = new Array(9).fill(null);
        let dominantTrait = "";
        let preferredEnv = "";
        let finalResultKey = "";

        const msgBox = document.getElementById("mascot-msg");
        let tInterval;

        function updateMascot(msg) {
            clearInterval(tInterval);
            msgBox.textContent = ""; let i = 0;
            tInterval = setInterval(() => {
                if (i < msg.length) { msgBox.textContent += msg.charAt(i); i++; } 
                else clearInterval(tInterval);
            }, 25);
        }

        function init() {
            let p1 = phase1Pool.sort(() => 0.5 - Math.random()).slice(0, 5);
            for(let i=0; i<5; i++) activeQuestions[i] = { ...p1[i], multi: true, max: 2 };
            activeQuestions[5] = { ...phase2Pool[0], multi: false, max: 1 };
            render();
        }

        function render() {
            const qArea = document.getElementById("q-area");
            qArea.classList.remove("fade-in"); qArea.classList.add("fade-out");

            setTimeout(() => {
                let q = activeQuestions[currentStep];
                document.getElementById("back-btn").style.visibility = currentStep > 0 ? "visible" : "hidden";
                document.getElementById("counter").innerText = `Step ${currentStep + 1} / 9`;
                document.getElementById("question-text").innerText = q.text;
                document.getElementById("progress").style.width = ((currentStep) / 9) * 100 + "%";

                const box = document.getElementById("options-box"); box.innerHTML = "";
                let selections = userAnswers[currentStep] || [];

                q.options.forEach(opt => {
                    let btn = document.createElement("button"); btn.className = "option-btn";
                    if(selections.some(s => s.text === opt.text)) btn.classList.add("selected");
                    btn.innerText = opt.text;
                    btn.onclick = () => handleSelect(opt, btn, q.multi, q.max);
                    box.appendChild(btn);
                });

                document.getElementById("next-btn").classList.toggle("active", selections.length > 0);
                if (currentStep === 0 && !userAnswers[0]) updateMascot("Welcome to the Matrix. Let's see where you belong.");

                qArea.classList.remove("fade-out"); qArea.classList.add("fade-in");
            }, 300);
        }

        function handleSelect(opt, btn, multi, max) {
            let current = userAnswers[currentStep] || [];
            if (!multi) {
                userAnswers[currentStep] = [opt];
                submitStep();
            } else {
                const idx = current.findIndex(o => o.text === opt.text);
                if (idx > -1) current.splice(idx, 1);
                else if (current.length < max) current.push(opt);
                userAnswers[currentStep] = current;
                render();
            }
        }

        function goBack() { currentStep--; render(); }

        function submitStep() {
            if (currentStep === 4) { // Tie-Breaker Logic
                let counts = { A:0, N:0, C:0, P:0 };
                userAnswers.slice(0,5).flat().forEach(a => counts[a.trait]++);
                let traits = Object.keys(counts).sort((a,b) => counts[b] - counts[a] || "PCAN".indexOf(a) - "PCAN".indexOf(b));
                dominantTrait = traits[0];
                let p3 = deepDivePools[dominantTrait].sort(() => 0.5 - Math.random());
                for(let i=0; i<3; i++) activeQuestions[6+i] = { ...p3[0], multi: false, max: 1 };
            } else if (currentStep === 5) {
                preferredEnv = userAnswers[5][0].env;
            }
            currentStep++;
            if (currentStep >= 9) finish(); else render();
        }

        function finish() {
            let p3Counts = {};
            userAnswers.slice(6,9).flat().forEach(a => p3Counts[a.res] = (p3Counts[a.res]||0)+1);
            let sub = Object.keys(p3Counts).sort((a,b) => p3Counts[b]-p3Counts[a])[0];
            finalResultKey = sub + "_" + preferredEnv;
            
            let res = resultsData[finalResultKey] || { cat: "Member", title: "ESTIEM Strategist", desc: "Your skills span multiple domains." };
            document.getElementById("q-area").style.display = "none";
            document.getElementById("res-category").innerText = res.cat;
            document.getElementById("res-title").innerText = res.title;
            document.getElementById("res-desc").innerText = res.desc;
            document.getElementById("result-screen").style.display = "block";
            setTimeout(() => document.getElementById("result-screen").classList.add("fade-in"), 50);
            updateMascot("The stars have aligned. Your path is clear.");
        }

        async function submitFeedback(score) {
            document.querySelectorAll(".acc-btn").forEach(b => {
                b.disabled = true;
                if(b.innerText.includes(score)) b.classList.add("voted");
            });

            const { error } = await _supabase.from('results_v16').insert([{
                trait: dominantTrait,
                env: preferredEnv,
                result: finalResultKey,
                accuracy: score,
                path: userAnswers.slice(6,9).flat().map(a => a.res).join(",")
            }]);
            
            if(!error) console.log("Feedback recorded.");
        }

        init();
    </script>
</body>
</html>
