        function updateMascot(message) {
            clearInterval(typewriterInterval);
            mascotMsg.textContent = ""; 
            let i = 0;
            typewriterInterval = setInterval(() => {
                if (i < message.length) {

                    i++; 
                } else { 
                    clearInterval(typewriterInterval); 
                }
            }, 30);

        function initTest() {
            let shuffledP1 = phase1Pool.sort(() => 0.5 - Math.random()).slice(0, 5);
            for(let i=0; i<5; i++) { activeQuestions[i] = { ...shuffledP1[i], phase: "Phase 1: Instincts", multi: true, max: 2 }; }
            
            activeQuestions[5] = { ...phase2Pool[Math.floor(Math.random() * phase2Pool.length)], phase: "Phase 2: Crossroads", multi: false, max: 1 };
            renderQuestion();
        }

        function renderQuestion() {
            const qArea = document.getElementById("q-area");
            const helperText = document.getElementById("helper-text");
            const nextBtn = document.getElementById("next-btn");
            const backBtn = document.getElementById("back-btn");
            
            qArea.classList.remove("fade-in"); qArea.classList.add("fade-out");

            setTimeout(() => {
                let currentData = activeQuestions[currentStep];
                let selectedOptions = userAnswers[currentStep] || [];

                backBtn.style.visibility = currentStep > 0 ? "visible" : "hidden";

                if (currentStep < 5) {
                    helperText.innerText = "Select up to 2 options."; helperText.style.display = "block";
                    if(currentStep === 0 && !userAnswers[0]) updateMascot("Welcome to the Network. Let's see where you belong.");
                } else if (currentStep === 5) {
                    helperText.innerText = "Crucial decision: Select 1 option."; helperText.style.display = "block";
                    if(!userAnswers[5]) updateMascot("A crucial fork in the road... Where will you walk?");
                } else {
                    helperText.style.display = "none";
                    if(currentStep === 6 && !userAnswers[6]) updateMascot("I see your true colors shining through...");
                }

                document.getElementById("counter").innerText = `Step ${currentStep + 1} / ${totalSteps}`;
                document.getElementById("phase-label").innerText = currentData.phase;
                document.getElementById("question-text").innerText = currentData.text;
                document.getElementById("progress").style.width = ((currentStep) / totalSteps) * 100 + "%";

                const optionsBox = document.getElementById("options-box"); optionsBox.innerHTML = "";
                
                // Shuffle options for added randomness and fairness
                let displayOptions = [...currentData.options].sort(() => 0.5 - Math.random());

                displayOptions.forEach((opt, index) => {
                    let btn = document.createElement("button"); 
                    btn.className = "option-btn"; 
                    btn.innerText = opt.text;
                    
                    let isSelected = selectedOptions.some(o => o.text === opt.text);
                    if(isSelected) btn.classList.add("selected");

                    btn.onclick = () => toggleSelection(opt, btn, currentData.multi, currentData.max);
                    optionsBox.appendChild(btn);
                });

                nextBtn.classList.toggle("active", selectedOptions.length > 0);
                nextBtn.innerText = currentStep === totalSteps - 1 ? "Finish Analysis" : "Next";

                qArea.classList.remove("fade-out"); qArea.classList.add("fade-in");
            }, 300);
        }

        function toggleSelection(option, btn, isMulti, max) {
            let currentSelections = userAnswers[currentStep] || [];

            if (!isMulti) {
                document.querySelectorAll(".option-btn").forEach(b => b.classList.remove("selected"));
                btn.classList.add("selected");
                userAnswers[currentStep] = [option];
                document.getElementById("next-btn").classList.add("active");
                return;
            }

            const index = currentSelections.findIndex(o => o.text === option.text);
            
            if (index > -1) {
                currentSelections.splice(index, 1); 
                btn.classList.remove("selected"); 
                document.getElementById("helper-text").classList.remove("error");
            } else {
                if (currentSelections.length < max) { 
                    currentSelections.push(option); 
                    btn.classList.add("selected"); 
                    document.getElementById("helper-text").classList.remove("error");
                } else { 
                    btn.classList.remove("shake-effect"); void btn.offsetWidth; btn.classList.add("shake-effect");
                    document.getElementById("helper-text").innerText = "You can only select up to 2 options!";
                    document.getElementById("helper-text").classList.add("error");
                }
            }

            userAnswers[currentStep] = currentSelections;
            const nextBtn = document.getElementById("next-btn");
            nextBtn.classList.toggle("active", currentSelections.length > 0);
        }

        function goBack() {
            if (currentStep > 0) {
                currentStep--;
                renderQuestion();
            }
        }

        function submitStep() {
            let currentSelections = userAnswers[currentStep] || [];
            if(currentSelections.length === 0) return;

            if (currentStep === 4) {
                let counts = { A: 0, N: 0, C: 0, P: 0 };
                for(let i=0; i<=4; i++) { userAnswers[i].forEach(opt => counts[opt.trait]++); }
                
                let maxPoints = 0;
                let topTraits = [];
                for(let trait in counts) {
                    if(counts[trait] > maxPoints) { maxPoints = counts[trait]; topTraits = [trait]; }
                    else if (counts[trait] === maxPoints) { topTraits.push(trait); }
                }
                
                // Deterministic Tie-Breaker: P > C > A > N
                if (topTraits.length > 1) {
                    if(topTraits.includes('P')) dominantTrait = 'P';
                    else if(topTraits.includes('C')) dominantTrait = 'C';
                    else if(topTraits.includes('A')) dominantTrait = 'A';
                    else dominantTrait = 'N';
                } else {
                    dominantTrait = topTraits[0];
                }
                
                let shuffledP3 = deepDivePools[dominantTrait].sort(() => 0.5 - Math.random()).slice(0, 3);
                for(let i=0; i<3; i++) { activeQuestions[6+i] = { ...shuffledP3[i], phase: "Phase 3: Deep Dive", multi: false, max: 1 }; }
            } 
            else if (currentStep === 5) {
                preferredEnvironment = userAnswers[5][0].env; 
            }

            currentStep++;

            if (currentStep >= totalSteps) {
                calculateFinalResult();
            } else { 
                renderQuestion(); 
            }
        }

        function calculateFinalResult() {
            let p3Counts = {};
            for(let i=6; i<=8; i++) {
                let res = userAnswers[i][0].res;
                p3Counts[res] = (p3Counts[res] || 0) + 1;
            }
            
            let finalKey = Object.keys(p3Counts).reduce((a, b) => p3Counts[a] >= p3Counts[b] ? a : b);
            let exactMatchKey = finalKey + "_" + preferredEnvironment;
            globalExactMatchKey = exactMatchKey; 
            
            // Log Data Setup
            let p1Summary = [];
            for(let i=0; i<=4; i++) { p1Summary.push(userAnswers[i].map(o => o.trait).join("+")); }
            let p3Summary = [];
            for(let i=6; i<=8; i++) { p3Summary.push(userAnswers[i][0].res); }
            
            finalLogData = `[V17_FINAL] P1:[${p1Summary.join(" | ")}] P2:[${preferredEnvironment}] P3:[${p3Summary.join(", ")}] -> ${resultsData[exactMatchKey].title}`;
            
            showResult(exactMatchKey);
        }

                resScreen.style.display = "block"; 
                setTimeout(() => { resScreen.classList.add("fade-in"); }, 50);
            }, 300);
        }

                }
            }
            const p1Distribution = `A:${counts.A}, N:${counts.N}, C:${counts.C}, P:${counts.P}`;

            const payload = {
                trait: dominantTrait,
                env: preferredEnvironment,
                result: globalExactMatchKey,
                accuracy: score,
                path: p3Path.join(","),
                p1_data: p1Distribution // Added for calibration
            };

            const { data, error } = await supabaseClient.from('results_v17').insert([payload]);
            
            if(error) {
                console.error("Supabase Error:", error);
                document.getElementById('copy-feedback').style.display = 'block'; 
                document.getElementById('copy-feedback').innerText = "⚠️ Error sending to DB. Copy Data Instead.";
            } else {
                btnElement.innerText = "✅ " + score + " (Recorded)";
            }
        }

        // KULLANICI VERISINI KOPYALAMA FONKSIYONU
        function copyFeedbackData() {
            navigator.clipboard.writeText(finalLogData).then(() => {
                const btn = document.getElementById("copy-feedback");
                btn.innerText = "✅ Copied to Clipboard!";
                setTimeout(() => { btn.innerText = "📋 Copy Feedback Data (Fallback)"; }, 3000);
            }).catch(err => {
                console.error('Failed to copy text: ', err);
            });
        }

        initTest();
    </script>
</body>
</html>
